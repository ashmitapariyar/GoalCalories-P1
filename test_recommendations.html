<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Recommendations API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background: #45a049;
        }
        #output {
            margin-top: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>Test Food Recommendations API</h1>
    <button onclick="testAPI()">Test API Call</button>
    <div id="output"></div>

    <script>
        function testAPI() {
            const output = document.getElementById('output');
            output.textContent = 'Loading...';
            
            console.log('Making API call...');
            
            fetch('./api/get_food_recommendations.php')
                .then(response => {
                    console.log('Response status:', response.status);
                    console.log('Response headers:', response.headers);
                    return response.text();
                })
                .then(text => {
                    console.log('Raw response:', text);
                    output.textContent = 'Raw Response:\n' + text + '\n\n';
                    
                    try {
                        const data = JSON.parse(text);
                        output.textContent += 'Parsed JSON:\n' + JSON.stringify(data, null, 2);
                    } catch (e) {
                        output.textContent += 'JSON Parse Error: ' + e.message;
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    output.textContent = 'Error: ' + error.message;
                });
        }
    </script>
</body>
</html>
